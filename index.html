    ctx.fillStyle = '#4a2818';
    ctx.beginPath(); ctx.ellipse(0, -16 * s, 3 * s, 2 * s, 0, 0, Math.PI * 2); ctx.fill();

    // Sad mouth
    ctx.strokeStyle = '#5c3d2e';
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.arc(0, -8 * s, 4 * s, Math.PI + 0.3, -0.3);
    ctx.stroke();

    // Paws
    ctx.fillStyle = '#c69c6d';
    ctx.beginPath(); ctx.ellipse(-12 * s, 28 * s, 6 * s, 4 * s, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(12 * s, 28 * s, 6 * s, 4 * s, 0.3, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
}

function drawHawk(x, y) {
    const sx = x * scale;
    const sy = screenY(Math.round(y / TILE));
    const s = scale * 1.8;
    const wingT = lastTime * 8;
    const wingFlap = Math.sin(wingT) * 18 * s;
    const wingFlap2 = Math.sin(wingT + 0.3) * 14 * s; // secondary feather lag

    ctx.save();
    ctx.translate(sx + TILE * scale / 2, sy);

    // Ground shadow — large oval
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, 35 * s, 30 * s, 9 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // === Tail feathers (behind body) ===
    ctx.fillStyle = '#2a1a0e';
    ctx.beginPath();
    ctx.moveTo(-6 * s, -2 * s);
    ctx.lineTo(-3 * s, 16 * s);
    ctx.lineTo(0, 18 * s);
    ctx.lineTo(3 * s, 16 * s);
    ctx.lineTo(6 * s, -2 * s);
    ctx.fill();
    // Tail fan lines
    ctx.strokeStyle = '#1a1008';
    ctx.lineWidth = 0.8 * s;
    for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(i * 2 * s, 0);
        ctx.lineTo(i * 1.5 * s, 16 * s);
        ctx.stroke();
    }

    // === Wings (large, detailed) ===
    // Left wing
    ctx.fillStyle = '#3a2515';
    ctx.beginPath();
    ctx.moveTo(-8 * s, -18 * s);
    ctx.quadraticCurveTo(-25 * s, -28 * s - wingFlap, -48 * s, -22 * s - wingFlap);
    ctx.lineTo(-50 * s, -18 * s - wingFlap2);
    ctx.lineTo(-44 * s, -14 * s - wingFlap2);
    ctx.lineTo(-38 * s, -16 * s - wingFlap2);
    ctx.lineTo(-32 * s, -12 * s - wingFlap2);
    ctx.lineTo(-8 * s, -8 * s);
    ctx.closePath();
    ctx.fill();
    // Wing top layer (lighter brown)
    ctx.fillStyle = '#5a3a20';
    ctx.beginPath();
    ctx.moveTo(-8 * s, -18 * s);
    ctx.quadraticCurveTo(-22 * s, -26 * s - wingFlap * 0.8, -38 * s, -22 * s - wingFlap * 0.9);
    ctx.lineTo(-28 * s, -14 * s - wingFlap2 * 0.7);
    ctx.lineTo(-8 * s, -12 * s);
    ctx.closePath();
    ctx.fill();
    // Wing feather lines
    ctx.strokeStyle = '#2a1a0e';
    ctx.lineWidth = 0.7 * s;
    for (let i = 0; i < 5; i++) {
        const t = (i + 1) / 6;
        const fx = -8 * s + (-42 * s + 8 * s) * t;
        const fy1 = -18 * s + (-22 * s + 18 * s) * t - wingFlap * t;
        const fy2 = -8 * s + (-12 * s + 8 * s) * t - wingFlap2 * t * 0.5;
        ctx.beginPath(); ctx.moveTo(fx, fy1); ctx.lineTo(fx + 3 * s, fy2); ctx.stroke();
    }

    // Right wing (mirror)
    ctx.fillStyle = '#3a2515';
    ctx.beginPath();
    ctx.moveTo(8 * s, -18 * s);
    ctx.quadraticCurveTo(25 * s, -28 * s - wingFlap, 48 * s, -22 * s - wingFlap);
    ctx.lineTo(50 * s, -18 * s - wingFlap2);
    ctx.lineTo(44 * s, -14 * s - wingFlap2);
    ctx.lineTo(38 * s, -16 * s - wingFlap2);
    ctx.lineTo(32 * s, -12 * s - wingFlap2);
    ctx.lineTo(8 * s, -8 * s);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#5a3a20';
    ctx.beginPath();
    ctx.moveTo(8 * s, -18 * s);
    ctx.quadraticCurveTo(22 * s, -26 * s - wingFlap * 0.8, 38 * s, -22 * s - wingFlap * 0.9);
    ctx.lineTo(28 * s, -14 * s - wingFlap2 * 0.7);
    ctx.lineTo(8 * s, -12 * s);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2a1a0e';
    for (let i = 0; i < 5; i++) {
        const t = (i + 1) / 6;
        const fx = 8 * s + (42 * s - 8 * s) * t;
        const fy1 = -18 * s + (-22 * s + 18 * s) * t - wingFlap * t;
        const fy2 = -8 * s + (-12 * s + 8 * s) * t - wingFlap2 * t * 0.5;
        ctx.beginPath(); ctx.moveTo(fx, fy1); ctx.lineTo(fx - 3 * s, fy2); ctx.stroke();
    }

    // === Body ===
    ctx.fillStyle = '#3a2010';
    ctx.beginPath();
    ctx.ellipse(0, -16 * s, 10 * s, 16 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // Breast — lighter golden-brown
    ctx.fillStyle = '#8b6a3a';
    ctx.beginPath();
    ctx.ellipse(0, -12 * s, 7 * s, 10 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // Breast streaks
    ctx.strokeStyle = '#5a3a1a';
    ctx.lineWidth = 0.6 * s;
    for (let i = 0; i < 4; i++) {
        const bx = -3 * s + i * 2 * s;
        ctx.beginPath();
        ctx.moveTo(bx, -18 * s);
        ctx.lineTo(bx + 0.5 * s, -6 * s);
        ctx.stroke();
    }

    // === Neck ===
    ctx.fillStyle = '#f5f0e8';
    ctx.beginPath();
    ctx.ellipse(0, -28 * s, 6 * s, 6 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // === Head — iconic white bald eagle head ===
    ctx.fillStyle = '#f5f0e8';
    ctx.beginPath();
    ctx.ellipse(0, -36 * s, 9 * s, 8 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // Feather texture on head
    ctx.fillStyle = '#e8e0d0';
    ctx.beginPath();
    ctx.ellipse(-3 * s, -38 * s, 4 * s, 3 * s, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(3 * s, -38 * s, 4 * s, 3 * s, 0.2, 0, Math.PI * 2);
    ctx.fill();

    // === Brow ridge (fierce look) ===
    ctx.fillStyle = '#f5f0e8';
    ctx.beginPath();
    ctx.moveTo(-7 * s, -38 * s);
    ctx.lineTo(-3 * s, -40 * s);
    ctx.lineTo(0, -39 * s);
    ctx.lineTo(3 * s, -40 * s);
    ctx.lineTo(7 * s, -38 * s);
    ctx.lineTo(0, -37 * s);
    ctx.closePath();
    ctx.fill();

    // === Eyes — fierce, piercing ===
    // Eye sockets (dark)
    ctx.fillStyle = '#2a1a0e';
    ctx.beginPath(); ctx.ellipse(-4 * s, -36 * s, 3 * s, 2.5 * s, -0.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4 * s, -36 * s, 3 * s, 2.5 * s, 0.1, 0, Math.PI * 2); ctx.fill();
    // Iris — golden yellow
    ctx.fillStyle = '#e8b020';
    ctx.beginPath(); ctx.arc(-4 * s, -36 * s, 2 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4 * s, -36 * s, 2 * s, 0, Math.PI * 2); ctx.fill();
    // Pupils
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-4 * s, -36 * s, 1 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4 * s, -36 * s, 1 * s, 0, Math.PI * 2); ctx.fill();
    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-3.3 * s, -36.8 * s, 0.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4.7 * s, -36.8 * s, 0.5 * s, 0, Math.PI * 2); ctx.fill();

    // === Beak — large, hooked, bright yellow ===
    ctx.fillStyle = '#f0b820';
    ctx.beginPath();
    ctx.moveTo(-3 * s, -34 * s);
    ctx.lineTo(0, -33 * s);
    ctx.lineTo(3 * s, -34 * s);
    ctx.lineTo(2 * s, -30 * s);
    ctx.quadraticCurveTo(0, -26 * s, -1 * s, -28 * s);
    ctx.lineTo(-2 * s, -30 * s);
    ctx.closePath();
    ctx.fill();
    // Beak hook
    ctx.fillStyle = '#d0a010';
    ctx.beginPath();
    ctx.moveTo(0, -28 * s);
    ctx.quadraticCurveTo(1 * s, -25 * s, 0, -24 * s);
    ctx.lineTo(-1 * s, -26 * s);
    ctx.closePath();
    ctx.fill();
    // Nostril
    ctx.fillStyle = '#8a7010';
    ctx.beginPath(); ctx.ellipse(0, -31 * s, 1 * s, 0.6 * s, 0, 0, Math.PI * 2); ctx.fill();

    // === Talons (dangling below) ===
    ctx.strokeStyle = '#d0a010';
    ctx.lineWidth = 1.5 * s;
    ctx.lineCap = 'round';
    // Left foot
    for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(-5 * s, 2 * s);
        ctx.lineTo(-5 * s + i * 2.5 * s, 12 * s);
        ctx.quadraticCurveTo(-5 * s + i * 3 * s, 14 * s, -5 * s + i * 2 * s, 15 * s);
        ctx.stroke();
    }
    // Right foot
    for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(5 * s, 2 * s);
        ctx.lineTo(5 * s + i * 2.5 * s, 12 * s);
        ctx.quadraticCurveTo(5 * s + i * 3 * s, 14 * s, 5 * s + i * 2 * s, 15 * s);
        ctx.stroke();
    }

    ctx.restore();
}

function drawHUD() {
    const pad = 12 * scale;
    const fontSize = 20 * scale;

    ctx.save();

    // Score (top left)
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    roundRect(ctx, pad, pad, 80 * scale, 32 * scale, 8 * scale);
    ctx.fill();
    ctx.fillStyle = '#e8dcc8';
    ctx.font = `bold ${fontSize}px monospace`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(game.score.toString(), pad + 10 * scale, pad + 16 * scale);

    // Acorns (top right)
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    roundRect(ctx, W - pad - 90 * scale, pad, 90 * scale, 32 * scale, 8 * scale);
    ctx.fill();

    // Acorn icon
    const acornX = W - pad - 76 * scale;
    const acornY = pad + 16 * scale;
    ctx.fillStyle = '#8b6914';
    ctx.beginPath();
    ctx.arc(acornX, acornY - 3 * scale, 6 * scale, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#c68c3c';
    ctx.beginPath();
    ctx.ellipse(acornX, acornY + 2 * scale, 5 * scale, 6 * scale, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#e8dcc8';
    ctx.font = `bold ${fontSize}px monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(game.coins.toString(), acornX + 12 * scale, acornY);

    // Lives (hearts, top center)
    if (game.lives > 0) {
        const heartsY = pad + 16 * scale;
        const heartSpacing = 22 * scale;
        const totalW = game.lives * heartSpacing;
        const startX = W / 2 - totalW / 2 + heartSpacing / 2;
        for (let i = 0; i < game.lives; i++) {
            const hx = startX + i * heartSpacing;
            ctx.fillStyle = '#e05050';
            ctx.beginPath();
            ctx.moveTo(hx, heartsY - 3 * scale);
            ctx.bezierCurveTo(hx - 6 * scale, heartsY - 10 * scale, hx - 12 * scale, heartsY - 1 * scale, hx, heartsY + 6 * scale);
            ctx.bezierCurveTo(hx + 12 * scale, heartsY - 1 * scale, hx + 6 * scale, heartsY - 10 * scale, hx, heartsY - 3 * scale);
            ctx.fill();
        }
    }

    ctx.restore();
}

function drawSoundToggle() {
    const btn = getSoundBtnBounds();
    const cx = btn.x + btn.w / 2;
    const cy = btn.y + btn.h / 2;
    const s = scale;

    ctx.save();
    // Background circle
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.arc(cx, cy, btn.w / 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = soundEnabled ? '#e8dcc8' : '#8a7a6a';
    ctx.strokeStyle = soundEnabled ? '#e8dcc8' : '#8a7a6a';
    ctx.lineWidth = 2 * s;

    // Speaker body
    ctx.beginPath();
    ctx.moveTo(cx - 6 * s, cy - 3 * s);
    ctx.lineTo(cx - 2 * s, cy - 3 * s);
    ctx.lineTo(cx + 3 * s, cy - 7 * s);
    ctx.lineTo(cx + 3 * s, cy + 7 * s);
    ctx.lineTo(cx - 2 * s, cy + 3 * s);
    ctx.lineTo(cx - 6 * s, cy + 3 * s);
    ctx.closePath();
    ctx.fill();

    if (soundEnabled) {
        // Sound waves
        ctx.beginPath();
        ctx.arc(cx + 5 * s, cy, 4 * s, -0.6, 0.6);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx + 5 * s, cy, 8 * s, -0.5, 0.5);
        ctx.stroke();
    } else {
        // X mark
        ctx.beginPath();
        ctx.moveTo(cx + 5 * s, cy - 5 * s);
        ctx.lineTo(cx + 11 * s, cy + 5 * s);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx + 11 * s, cy - 5 * s);
        ctx.lineTo(cx + 5 * s, cy + 5 * s);
        ctx.stroke();
    }

    ctx.restore();
}

function drawMenu() {
    const now = lastTime;
    const centerX = W / 2;

    // Forest background
    ctx.fillStyle = '#2a4a1e';
    ctx.fillRect(0, 0, W, H);

    // Gradient overlay — darker at bottom
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(60,100,40,0.3)');
    grad.addColorStop(0.5, 'rgba(30,60,20,0.1)');
    grad.addColorStop(1, 'rgba(10,20,8,0.5)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Background trees
    ctx.save();
    for (let i = 0; i < 12; i++) {
        const tx = ((i * 73 + 17) % 11) / 11 * W;
        const ty = ((i * 47 + 31) % 7) / 7 * H * 0.6 + H * 0.15;
        const ts = scale * (0.4 + (i % 3) * 0.2);
        ctx.globalAlpha = 0.15 + (i % 3) * 0.05;
        ctx.fillStyle = i % 2 === 0 ? '#1a3a12' : '#2a4a1a';
        if (i % 3 === 0) {
            // Pine
            ctx.beginPath();
            ctx.moveTo(tx, ty - 50 * ts);
            ctx.lineTo(tx - 20 * ts, ty);
            ctx.lineTo(tx + 20 * ts, ty);
            ctx.fill();
        } else {
            // Oak blob
            ctx.beginPath();
            ctx.arc(tx, ty - 20 * ts, 18 * ts, 0, Math.PI * 2);
            ctx.fill();
        }
        // Trunk
        ctx.fillStyle = '#1a2a10';
        ctx.fillRect(tx - 3 * ts, ty, 6 * ts, 20 * ts);
    }
    ctx.restore();

    // Floating leaves
    ctx.save();
    for (const leaf of leaves) {
        leaf.x += leaf.vx * 0.5;
        leaf.y += leaf.vy * 0.5;
        leaf.rot += leaf.rotV * 0.016;
        if (leaf.y > VISIBLE_ROWS * TILE) { leaf.y = -10; leaf.x = Math.random() * COLS * TILE; }
        if (leaf.x > COLS * TILE) leaf.x = 0;

        const lx = leaf.x * scale;
        const ly = leaf.y * scale;
        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(leaf.rot);
        ctx.fillStyle = leaf.color;
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.ellipse(0, 0, leaf.size * scale, leaf.size * 0.5 * scale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    ctx.restore();

    // Title
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Title shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = `bold ${42 * scale}px monospace`;
    ctx.fillText("CHIPPY'S", centerX + 2 * scale, H * 0.13 + 2 * scale);
    ctx.fillText('CROSSING', centerX + 2 * scale, H * 0.13 + 46 * scale + 2 * scale);

    // Title text
    ctx.fillStyle = '#f0e8d0';
    ctx.font = `bold ${42 * scale}px monospace`;
    ctx.fillText("CHIPPY'S", centerX, H * 0.13);
    ctx.fillStyle = '#8bc34a';
    ctx.fillText('CROSSING', centerX, H * 0.13 + 46 * scale);

    ctx.restore();

    // Animated chipmunk (idle bounce)
    ctx.save();
    const chipBounce = Math.sin(now * 3) * 5 * scale;
    const chipX = centerX;
    const chipY = H * 0.38 + chipBounce;
    const s = scale * 2.2;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(chipX, H * 0.38 + 28 * s, 20 * s, 6 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Reuse chipmunk drawing at menu position
    ctx.translate(chipX, chipY);

    // Tail
    ctx.fillStyle = '#8B6914';
    ctx.beginPath();
    ctx.moveTo(-2 * s, -8 * s);
    ctx.quadraticCurveTo(-12 * s, -35 * s, -4 * s, -40 * s);
    ctx.quadraticCurveTo(4 * s, -42 * s, 6 * s, -30 * s);
    ctx.quadraticCurveTo(6 * s, -18 * s, 2 * s, -8 * s);
    ctx.fill();
    ctx.fillStyle = '#d4a854';
    ctx.beginPath();
    ctx.moveTo(-4 * s, -35 * s);
    ctx.quadraticCurveTo(-2 * s, -42 * s, 4 * s, -38 * s);
    ctx.quadraticCurveTo(5 * s, -35 * s, 2 * s, -30 * s);
    ctx.fill();

    // Body
    ctx.fillStyle = '#a0724e';
    ctx.beginPath();
    ctx.ellipse(0, 4 * s, 14 * s, 18 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5c3d2e';
    ctx.fillRect(-2 * s, -12 * s, 4 * s, 22 * s);
    ctx.fillStyle = '#f5e6c8';
    ctx.fillRect(-5 * s, -10 * s, 2 * s, 18 * s);
    ctx.fillRect(3 * s, -10 * s, 2 * s, 18 * s);

    // Head
    ctx.fillStyle = '#b8845a';
    ctx.beginPath();
    ctx.ellipse(0, -14 * s, 11 * s, 10 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#deb887';
    ctx.beginPath(); ctx.ellipse(-9 * s, -11 * s, 6 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9 * s, -11 * s, 6 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();

    // Ears
    ctx.fillStyle = '#8B6914';
    ctx.beginPath(); ctx.arc(-8 * s, -22 * s, 4 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(8 * s, -22 * s, 4 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e8c89e';
    ctx.beginPath(); ctx.arc(-8 * s, -22 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(8 * s, -22 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();

    // Eyes — happy/bright for menu
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-4 * s, -16 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4 * s, -16 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-3 * s, -17 * s, 1 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5 * s, -17 * s, 1 * s, 0, Math.PI * 2); ctx.fill();

    // Nose
    ctx.fillStyle = '#4a2818';
    ctx.beginPath(); ctx.ellipse(0, -12 * s, 2 * s, 1.5 * s, 0, 0, Math.PI * 2); ctx.fill();

    // Happy smile
    ctx.strokeStyle = '#5c3d2e';
    ctx.lineWidth = 1.2 * s;
    ctx.beginPath();
    ctx.arc(0, -10 * s, 3 * s, 0.2, Math.PI - 0.2);
    ctx.stroke();

    // Paws
    ctx.fillStyle = '#c69c6d';
    ctx.beginPath(); ctx.ellipse(-8 * s, 16 * s, 4 * s, 3 * s, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(8 * s, 16 * s, 4 * s, 3 * s, 0.3, 0, Math.PI * 2); ctx.fill();

    ctx.restore();

    // Subtitle below chipmunk
    ctx.fillStyle = '#8aaa60';
    ctx.font = `bold ${20 * scale}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('A forest adventure', centerX, H * 0.49);

    // Play button
    const btnW = 180 * scale;
    const btnH = 50 * scale;
    const btnX = centerX - btnW / 2;
    const btnY = H * 0.52;
    const pulse = 1 + Math.sin(now * 4) * 0.03;

    ctx.save();
    ctx.translate(centerX, btnY + btnH / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-centerX, -(btnY + btnH / 2));

    // Button shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    roundRect(ctx, btnX + 2 * scale, btnY + 3 * scale, btnW, btnH, 12 * scale);
    ctx.fill();

    ctx.fillStyle = '#3a7d20';
    ctx.beginPath();
    roundRect(ctx, btnX, btnY, btnW, btnH, 12 * scale);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${22 * scale}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('PLAY', centerX, btnY + btnH / 2);
    ctx.restore();

    // Best score
    const best = parseInt(localStorage.getItem('chippy_best') || '0');
    if (best > 0) {
        ctx.fillStyle = '#c68c3c';
        ctx.font = `bold ${14 * scale}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`Best: ${best}`, centerX, H * 0.52 + btnH + 20 * scale);
    }

    // How to Play button
    const htpBtnW = 180 * scale;
    const htpBtnH = 46 * scale;
    const htpBtnX = centerX - htpBtnW / 2;
    const htpBtnY = H * 0.66;

    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    roundRect(ctx, htpBtnX, htpBtnY, htpBtnW, htpBtnH, 8 * scale);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1.5 * scale;
    ctx.beginPath();
    roundRect(ctx, htpBtnX, htpBtnY, htpBtnW, htpBtnH, 8 * scale);
    ctx.stroke();

    ctx.fillStyle = '#c8b898';
    ctx.font = `bold ${17 * scale}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('HOW TO PLAY', centerX, htpBtnY + htpBtnH / 2);

    // Expanded instructions panel
    if (showHowToPlay) {
        const panelY = htpBtnY + htpBtnH + 8 * scale;
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath();
        roundRect(ctx, W * 0.08, panelY, W * 0.84, 100 * scale, 8 * scale);
        ctx.fill();

        ctx.fillStyle = '#c8b898';
        ctx.font = `${13 * scale}px monospace`;
        ctx.fillText('Arrow keys / WASD to move', centerX, panelY + 20 * scale);
        ctx.fillText('Tap to hop, swipe to turn', centerX, panelY + 40 * scale);
        ctx.fillText('Dodge snakes, ants &', centerX, panelY + 60 * scale);
        ctx.fillText('stampedes. Ride logs.', centerX, panelY + 78 * scale);
        ctx.fillText('Collect acorns!', centerX, panelY + 96 * scale);
    }

    // Shop button
    const shopBtnW = 180 * scale;
    const shopBtnH = 46 * scale;
    const shopBtnX = centerX - shopBtnW / 2;
    const shopBtnY = H * 0.76;

    ctx.fillStyle = 'rgba(200,168,72,0.15)';
    ctx.beginPath();
    roundRect(ctx, shopBtnX, shopBtnY, shopBtnW, shopBtnH, 10 * scale);
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,168,72,0.4)';
    ctx.lineWidth = 1.5 * scale;
    ctx.beginPath();
    roundRect(ctx, shopBtnX, shopBtnY, shopBtnW, shopBtnH, 10 * scale);
    ctx.stroke();

    ctx.fillStyle = '#f0d870';
    ctx.font = `bold ${17 * scale}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SHOP', centerX - 10 * scale, shopBtnY + shopBtnH / 2);

    // Acorn wallet preview next to shop text
    ctx.fillStyle = '#c69c6d';
    ctx.beginPath();
    ctx.ellipse(centerX + 28 * scale, shopBtnY + shopBtnH / 2, 5 * scale, 6 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#8B6914';
    ctx.beginPath();
    ctx.arc(centerX + 28 * scale, shopBtnY + shopBtnH / 2 - 7 * scale, 4 * scale, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#f0d870';
    ctx.font = `bold ${13 * scale}px monospace`;
    ctx.fillText(`${acornWallet}`, centerX + 50 * scale, shopBtnY + shopBtnH / 2);

    // Sound toggle switch
    const sndY = H * 0.87 + 18 * scale;
    const labelText = 'SOUND';
    ctx.fillStyle = '#c8b898';
    ctx.font = `bold ${17 * scale}px monospace`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(labelText, centerX - 12 * scale, sndY);

    // Switch track
    const trackW = 56 * scale;
    const trackH = 28 * scale;
    const trackX = centerX + 2 * scale;
    const trackY = sndY - trackH / 2;
    const trackR = trackH / 2;

    ctx.fillStyle = soundEnabled ? '#3a7d20' : '#4a4a4a';
    ctx.beginPath();
    roundRect(ctx, trackX, trackY, trackW, trackH, trackR);
    ctx.fill();

    // Switch track border
    ctx.strokeStyle = soundEnabled ? '#5aa830' : '#666';
    ctx.lineWidth = 1.5 * scale;
    ctx.beginPath();
    roundRect(ctx, trackX, trackY, trackW, trackH, trackR);
    ctx.stroke();

    // Switch knob
    const knobR = (trackH - 4 * scale) / 2;
    const knobX = soundEnabled ? trackX + trackW - knobR - 3 * scale : trackX + knobR + 3 * scale;
    const knobY = sndY;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(knobX, knobY, knobR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.arc(knobX, knobY + 1 * scale, knobR, 0, Math.PI * 2);
    ctx.fill();

}

function drawShop() {
    const centerX = W / 2;

    // Dark forest background
    ctx.fillStyle = '#1e3a14';
    ctx.fillRect(0, 0, W, H);
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(40,80,30,0.3)');
    grad.addColorStop(1, 'rgba(10,20,8,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Title
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#f0e8d0';
    ctx.font = `bold ${36 * scale}px monospace`;
    ctx.fillText('SHOP', centerX, H * 0.08);

    // Acorn wallet
    ctx.fillStyle = '#c8a848';
    ctx.font = `bold ${18 * scale}px monospace`;
    // Draw acorn icon
    const walletY = H * 0.15;
    const aX = centerX - 40 * scale;
    ctx.save();
    ctx.fillStyle = '#8B6914';
    ctx.beginPath();
    ctx.arc(aX, walletY - 4 * scale, 6 * scale, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#c69c6d';
    ctx.beginPath();
    ctx.ellipse(aX, walletY + 2 * scale, 7 * scale, 9 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#f0d870';
    ctx.fillText(`${acornWallet}`, centerX + 5 * scale, walletY);

    // Divider
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W * 0.1, H * 0.20);
    ctx.lineTo(W * 0.9, H * 0.20);
    ctx.stroke();

    // Extra Lives section
    ctx.fillStyle = '#c8b898';
    ctx.font = `bold ${16 * scale}px monospace`;
    ctx.fillText('EXTRA LIVES', centerX, H * 0.25);

    // Show current lives purchased
    const livesY = H * 0.30;
    // Draw hearts for purchased lives
    if (purchasedLives > 0) {
        const heartSpacing = 30 * scale;
        const totalW = purchasedLives * heartSpacing;
        const startX = centerX - totalW / 2 + heartSpacing / 2;
        for (let i = 0; i < purchasedLives; i++) {
            const hx = startX + i * heartSpacing;
            ctx.fillStyle = '#e05050';
            ctx.beginPath();
            ctx.moveTo(hx, livesY - 4 * scale);
            ctx.bezierCurveTo(hx - 8 * scale, livesY - 13 * scale, hx - 16 * scale, livesY - 1 * scale, hx, livesY + 8 * scale);
            ctx.bezierCurveTo(hx + 16 * scale, livesY - 1 * scale, hx + 8 * scale, livesY - 13 * scale, hx, livesY - 4 * scale);
            ctx.fill();
        }
    } else {
        ctx.fillStyle = '#6a6a6a';
        ctx.font = `${13 * scale}px monospace`;
        ctx.fillText('No lives yet', centerX, livesY);
    }

    // Buy life button
    const cost = purchasedLives < MAX_LIVES ? LIFE_COSTS[purchasedLives] : 0;
    const canBuy = purchasedLives < MAX_LIVES && acornWallet >= cost;
    const maxed = purchasedLives >= MAX_LIVES;

    const buyBtnW = 200 * scale;
    const buyBtnH = 56 * scale;
    const buyBtnX = centerX - buyBtnW / 2;
    const buyBtnY = H * 0.42;

    // Button background
    ctx.fillStyle = maxed ? '#3a3a3a' : (canBuy ? '#3a7d20' : '#4a4a4a');
    ctx.beginPath();
    roundRect(ctx, buyBtnX, buyBtnY, buyBtnW, buyBtnH, 10 * scale);
    ctx.fill();
    ctx.strokeStyle = maxed ? '#555' : (canBuy ? '#5aa830' : '#666');
    ctx.lineWidth = 1.5 * scale;
    ctx.beginPath();
    roundRect(ctx, buyBtnX, buyBtnY, buyBtnW, buyBtnH, 10 * scale);
    ctx.stroke();

    if (maxed) {
        ctx.fillStyle = '#888';
        ctx.font = `bold ${16 * scale}px monospace`;
        ctx.fillText('MAX LIVES', centerX, buyBtnY + buyBtnH / 2);
    } else {
        // Heart icon on button
        const bhx = centerX - 50 * scale;
        const bhy = buyBtnY + buyBtnH / 2;
        ctx.fillStyle = canBuy ? '#e05050' : '#6a4a4a';
        ctx.beginPath();
        ctx.moveTo(bhx, bhy - 4 * scale);
        ctx.bezierCurveTo(bhx - 6 * scale, bhy - 10 * scale, bhx - 12 * scale, bhy - 1 * scale, bhx, bhy + 6 * scale);
        ctx.bezierCurveTo(bhx + 12 * scale, bhy - 1 * scale, bhx + 6 * scale, bhy - 10 * scale, bhx, bhy - 4 * scale);
        ctx.fill();

        // "BUY" + cost
        ctx.fillStyle = canBuy ? '#fff' : '#888';
        ctx.font = `bold ${16 * scale}px monospace`;
        ctx.fillText(`BUY  ${cost}`, centerX + 10 * scale, buyBtnY + buyBtnH / 2);

        // Small acorn icon after cost
        const acX = centerX + 55 * scale;
        const acY = buyBtnY + buyBtnH / 2;
        ctx.fillStyle = canBuy ? '#c69c6d' : '#666';
        ctx.beginPath();
        ctx.ellipse(acX, acY, 5 * scale, 6 * scale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = canBuy ? '#8B6914' : '#555';
        ctx.beginPath();
        ctx.arc(acX, acY - 7 * scale, 4 * scale, Math.PI, 0);
        ctx.fill();
    }

    // Redeem Code button
    const codeBtnW = 180 * scale;
    const codeBtnH = 40 * scale;
    const codeBtnX = centerX - codeBtnW / 2;
    const codeBtnY = H * 0.62;

    ctx.fillStyle = 'rgba(180,140,60,0.15)';
    ctx.beginPath();
    roundRect(ctx, codeBtnX, codeBtnY, codeBtnW, codeBtnH, 8 * scale);
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,168,72,0.35)';
    ctx.lineWidth = 1.5 * scale;
    ctx.beginPath();
    roundRect(ctx, codeBtnX, codeBtnY, codeBtnW, codeBtnH, 8 * scale);
    ctx.stroke();

    ctx.fillStyle = '#d0b060';
    ctx.font = `bold ${14 * scale}px monospace`;
    ctx.fillText('REDEEM CODE', centerX, codeBtnY + codeBtnH / 2);

    // Back button
    const backBtnW = 150 * scale;
    const backBtnH = 46 * scale;
    const backBtnX = centerX - backBtnW / 2;
    const backBtnY = H * 0.85;

    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    roundRect(ctx, backBtnX, backBtnY, backBtnW, backBtnH, 10 * scale);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1.5 * scale;
    ctx.beginPath();
    roundRect(ctx, backBtnX, backBtnY, backBtnW, backBtnH, 10 * scale);
    ctx.stroke();

    ctx.fillStyle = '#c8b898';
    ctx.font = `bold ${17 * scale}px monospace`;
    ctx.fillText('BACK', centerX, backBtnY + backBtnH / 2);

    // Code entry popup overlay
    if (showCodePopup) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, W, H);

        const popW = W * 0.8;
        const popH = 220 * scale;
        const popX = centerX - popW / 2;
        const popY = H / 2 - popH / 2;

        // Popup background
        ctx.fillStyle = '#2a3a1e';
        ctx.beginPath();
        roundRect(ctx, popX, popY, popW, popH, 12 * scale);
        ctx.fill();
        ctx.strokeStyle = 'rgba(200,168,72,0.5)';
        ctx.lineWidth = 2 * scale;
        ctx.beginPath();
        roundRect(ctx, popX, popY, popW, popH, 12 * scale);
        ctx.stroke();

        // Title
        ctx.fillStyle = '#f0d870';
        ctx.font = `bold ${18 * scale}px monospace`;
        ctx.fillText(codeStep === 'code' ? 'ENTER CODE' : 'HOW MANY ACORNS?', centerX, popY + 30 * scale);

        // Input box
        const inputW = popW * 0.75;
        const inputH = 36 * scale;
        const inputX = centerX - inputW / 2;
        const inputY = popY + 55 * scale;

        ctx.fillStyle = '#1a2a12';
        ctx.beginPath();
        roundRect(ctx, inputX, inputY, inputW, inputH, 6 * scale);
        ctx.fill();
        ctx.strokeStyle = '#5a7a3a';
        ctx.lineWidth = 1.5 * scale;
        ctx.beginPath();
        roundRect(ctx, inputX, inputY, inputW, inputH, 6 * scale);
        ctx.stroke();

        // Input text + blinking cursor
        ctx.fillStyle = '#e8dcc8';
        ctx.font = `bold ${16 * scale}px monospace`;
        const cursor = Math.floor(lastTime * 2) % 2 === 0 ? '|' : '';
        ctx.fillText(codeInput + cursor, centerX, inputY + inputH / 2);

        // Submit button
        const subW = 120 * scale;
        const subH = 38 * scale;
        const subX = centerX - subW / 2;
        const subY = inputY + inputH + 15 * scale;

        ctx.fillStyle = '#3a7d20';
        ctx.beginPath();
        roundRect(ctx, subX, subY, subW, subH, 8 * scale);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${15 * scale}px monospace`;
        ctx.fillText('SUBMIT', centerX, subY + subH / 2);

        // Cancel button
        const canW = 100 * scale;
        const canH = 32 * scale;
        const canX = centerX - canW / 2;
        const canY = subY + subH + 12 * scale;

        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath();
        roundRect(ctx, canX, canY, canW, canH, 6 * scale);
        ctx.fill();
        ctx.fillStyle = '#999';
        ctx.font = `bold ${12 * scale}px monospace`;
        ctx.fillText('CANCEL', centerX, canY + canH / 2);

        // Message feedback
        if (codeMessage === 'success') {
            ctx.fillStyle = '#a0d880';
            ctx.font = `bold ${14 * scale}px monospace`;
            ctx.fillText(`+${codeReward} Acorns!`, centerX, canY + canH + 20 * scale);
        } else if (codeMessage === 'wrong') {
            ctx.fillStyle = '#e06060';
            ctx.font = `bold ${14 * scale}px monospace`;
            ctx.fillText(codeStep === 'code' ? 'Invalid code' : 'Enter a number', centerX, canY + canH + 20 * scale);
        }
    }
}

function drawGameOver() {
    const elapsed = lastTime - game.gameOverTime;
    const fade = Math.min(elapsed / 0.5, 0.75);

    ctx.fillStyle = `rgba(10,15,10,${fade})`;
    ctx.fillRect(0, 0, W, H);

    if (elapsed < 0.3) return;

    const centerX = W / 2;
    const centerY = H * 0.35;

    drawSadChipmunk(centerX, centerY);

    const best = parseInt(localStorage.getItem('chippy_best') || '0');

    ctx.fillStyle = '#e8dcc8';
    ctx.font = `bold ${28 * scale}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GAME OVER', centerX, H * 0.56);

    ctx.font = `${18 * scale}px monospace`;
    ctx.fillText(`Score: ${game.score}`, centerX, H * 0.63);
    ctx.fillText(`Acorns: ${game.coins}`, centerX, H * 0.68);

    ctx.fillStyle = '#c68c3c';
    ctx.font = `bold ${16 * scale}px monospace`;
    ctx.fillText(`Best: ${best}`, centerX, H * 0.74);

    // Try again button
    const btnW = 160 * scale;
    const btnH = 44 * scale;
    const btnX = centerX - btnW / 2;
    const btnY = H * 0.80;

    const pulse = 1 + Math.sin(lastTime * 4) * 0.03;
    ctx.save();
    ctx.translate(centerX, btnY + btnH / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-centerX, -(btnY + btnH / 2));

    ctx.fillStyle = '#3a7d20';
    ctx.beginPath();
    roundRect(ctx, btnX, btnY, btnW, btnH, 10 * scale);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${18 * scale}px monospace`;
    ctx.fillText('TRY AGAIN', centerX, btnY + btnH / 2);

    ctx.restore();

    // Menu button
    const menuBtnW = 160 * scale;
    const menuBtnH = 36 * scale;
    const menuBtnX = centerX - menuBtnW / 2;
    const menuBtnY = btnY + btnH + 12 * scale;

    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    roundRect(ctx, menuBtnX, menuBtnY, menuBtnW, menuBtnH, 8 * scale);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5 * scale;
    ctx.beginPath();
    roundRect(ctx, menuBtnX, menuBtnY, menuBtnW, menuBtnH, 8 * scale);
    ctx.stroke();

    ctx.fillStyle = '#c8b898';
    ctx.font = `bold ${14 * scale}px monospace`;
    ctx.fillText('MENU', centerX, menuBtnY + menuBtnH / 2);

    // Sound toggle on game over screen
    drawSoundToggle();
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
}

function shadeColor(color, percent) {
    const num = parseInt(color.replace('#',''), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.min(255, Math.max(0, (num >> 16) + amt));
    const G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amt));
    const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
    return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}

// --- Main Loop ---
function render(timestamp) {
    const now = timestamp / 1000;

    if (gameState === 'menu') {
        lastTime = now;
        drawMenu();
        requestAnimationFrame(render);
        return;
    }
    if (gameState === 'shop') {
        lastTime = now;
        drawShop();
        requestAnimationFrame(render);
        return;
    }

    update(now);

    // Clear + sky (forest canopy view)
    ctx.fillStyle = getSkyColor(game.score);
    ctx.fillRect(0, 0, W, H);

    const p = game.player;
    const minRow = Math.floor(game.cameraY / TILE) - 2;
    const maxRow = minRow + VISIBLE_ROWS + 4;

    // Draw rows back to front
    for (let r = maxRow; r >= minRow; r--) {
        drawRow(r);
    }

    // Draw chipmunk (flash when invincible)
    const showChip = !(game.invincible > 0 && Math.floor(lastTime * 10) % 2 === 0);
    if (showChip) drawChipmunk(p.x, p.y, 0, p.alive);

    // Hawk
    if (game.eagleActive) {
        drawHawk(game.eagleX, game.eagleY);
    }

    drawHUD();

    // Sound toggle during gameplay
    if (gameState === 'playing') {
        drawSoundToggle();
    }

    if (gameState === 'gameover') {
        drawGameOver();
    }

    requestAnimationFrame(render);
}

// --- Start ---
initGame(); // pre-generate rows for background, but don't start playing
requestAnimationFrame(render);

</script>
